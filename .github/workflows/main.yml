name: Build OpenJDK 25 for iOS (GitHub Actions)

on:
  workflow_dispatch:
    inputs:
      target_version:
        description: 'JDK version (should be 25)'
        required: true
        default: '25'
      clone_source:
        description: 'Use existing openjdk-25-clone or fresh clone?'
        required: true
        default: 'use-existing'
        type: choice
        options:
          - use-existing
          - fresh-clone

jobs:
  build-ios-jdk:
    runs-on: macos-latest
    steps:
      - name: Checkout repository (including submodules)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install build dependencies
        run: |
          brew update
          brew install ldid autoconf fontconfig xquartz

      - name: Set up Boot JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Select Xcode version
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Prepare source code (use existing clone or fresh clone)
        run: |
          cd angelauramc-openjdk-build
          chmod +x *.sh
          # 确保 ios-missing-include 存在
          mkdir -p ios-missing-include
          # 如果用户选择 fresh-clone，则删除旧的 openjdk-25-clone 并让脚本重新克隆
          if [[ "${{ github.event.inputs.clone_source }}" == "fresh-clone" ]]; then
            rm -rf ../openjdk-25-clone
          fi
          # 如果既没有 openjdk-25-clone 也没有 openjdk-25，脚本会自己 clone
          # 但为了保险，设置环境变量让 5_clonejdk.sh 使用正确的分支
          export TARGET_VERSION=${{ github.event.inputs.target_version }}

      - name: Fix Boot JDK path in build script (critical)
        run: |
          # 获取实际的 Boot JDK 路径
          BOOT_JDK=$(/usr/libexec/java_home -v 21)
          # 修改 6_buildjdk.sh 中的 --with-boot-jdk 行
          sed -i '' "s|--with-boot-jdk=\$(/usr/libexec/java_home -v \$TARGET_VERSION)|--with-boot-jdk=${BOOT_JDK}|g" angelauramc-openjdk-build/6_buildjdk.sh

      - name: Create dummy patches directory to avoid git apply errors
        run: |
          mkdir -p angelauramc-openjdk-build/patches/jre_25/ios
          # 可选：如果 files_mod.txt 中有需要手动应用的补丁，可以在这里用脚本生成 .diff
          # 但项目很可能已经把修改直接放进 openjdk-25-clone 了，所以留空即可

      - name: Build OpenJDK 25 for iOS (aarch64)
        run: |
          cd angelauramc-openjdk-build
          export BUILD_IOS=1
          export TARGET_VERSION=${{ github.event.inputs.target_version }}
          export TARGET_JDK="aarch64"
          export TOO_MANY_CORES=1
          # 如果存在 openjdk-25-clone，将其软链接或复制到 openjdk-25，避免重复 clone
          if [[ -d ../openjdk-25-clone ]]; then
            ln -sf ../openjdk-25-clone openjdk-25
          fi
          ./1_ci_build_arch_aarch64.sh

      - name: Collect artifacts
        if: success()
        run: |
          mkdir -p output
          find . -maxdepth 1 -name "*.tar.xz" -exec mv {} output/ \;
          # 如果还有单独的 dylib 等文件，也一并收集
          find . -name "*.dylib" -exec cp {} output/ \; 2>/dev/null || true

      - name: Upload JDK/JRE artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: openjdk-25-ios-aarch64
          path: output/
