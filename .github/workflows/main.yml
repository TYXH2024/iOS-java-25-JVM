name: Build OpenJDK 25 for iOS (GitHub Actions)

on:
  workflow_dispatch:

jobs:
  build-ios-jdk:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Boot JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      # 关键修复：configure 不认 aarch64-apple-ios，改用 darwin
      - name: Fix TARGET triple
        run: |
          sed -i '' 's/export TARGET=aarch64-apple-ios/export TARGET=aarch64-apple-darwin/' \
            angelauramc-openjdk-build/1_ci_build_arch_aarch64.sh

      # Boot JDK 路径硬编码
      - name: Fix Boot JDK path in 6_buildjdk.sh
        run: |
          BOOT_JDK=$(/usr/libexec/java_home -v 21)
          sed -i '' "s|--with-boot-jdk=\$(/usr/libexec/java_home -v \$TARGET_VERSION)|--with-boot-jdk=${BOOT_JDK}|g" \
            angelauramc-openjdk-build/6_buildjdk.sh

      - name: Ensure patches/ios directory exists (avoid git apply errors)
        run: mkdir -p angelauramc-openjdk-build/patches/jre_25/ios

      - name: Build OpenJDK 25 for iOS (aarch64)
        run: |
          cd angelauramc-openjdk-build
          export BUILD_IOS=1
          export TARGET_VERSION=25
          export TOO_MANY_CORES=1
          ./1_ci_build_arch_aarch64.sh

      - name: Collect artifacts
        if: success()
        run: |
          mkdir -p output
          find . -maxdepth 1 -name "*.tar.xz" -exec mv {} output/ \;

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: openjdk-25-ios-aarch64
          path: output/
