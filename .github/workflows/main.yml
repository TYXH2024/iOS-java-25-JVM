name: Build OpenJDK 25 for iOS

on:
  workflow_dispatch:

jobs:
  build-ios-jdk:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Boot JDK 24
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '24'

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      # 使用仓库已有的 openjdk-25-clone 作为源码
      - name: Use existing openjdk-25-clone
        run: |
          if [ ! -d "openjdk-25-clone" ]; then
            echo "ERROR: openjdk-25-clone not found in repository"
            exit 1
          fi
          rm -rf openjdk-25
          cp -r openjdk-25-clone openjdk-25

      # 禁用 5_clonejdk.sh 中的 git clone
      - name: Disable git clone in build script
        run: |
          sed -i '' 's/git clone/echo "Skipping git clone"/g' angelauramc-openjdk-build/5_clonejdk.sh

      # 修复 Boot JDK 路径
      - name: Fix Boot JDK path
        run: |
          BOOT_JDK=$(/usr/libexec/java_home -v 24)
          sed -i '' "s|--with-boot-jdk=\$(/usr/libexec/java_home -v \$TARGET_VERSION)|--with-boot-jdk=${BOOT_JDK}|g" \
            angelauramc-openjdk-build/6_buildjdk.sh

      - name: Apply icache patch
        run: |
          # 直接运行项目自带的 patch_icache.sh（需修正路径）
          sed -i '' 's|/tmp/openjdk-25-ios|openjdk-25|g' patch_icache.sh
          chmod +x patch_icache.sh
          ./patch_icache.sh

      - name: Create dummy patches directory
        run: mkdir -p angelauramc-openjdk-build/patches/jre_25/ios

      - name: Build OpenJDK 25 for iOS
        run: |
          cd angelauramc-openjdk-build
          export BUILD_IOS=1
          export TARGET_VERSION=25
          export TOO_MANY_CORES=1
          # 注意：保持原始的 TARGET=aarch64-apple-ios，因为 openjdk-25-clone 已支持
          ./1_ci_build_arch_aarch64.sh

      - name: Collect artifacts
        if: success()
        run: |
          mkdir -p output
          find . -maxdepth 1 -name "*.tar.xz" -exec mv {} output/ \;

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: openjdk-25-ios-aarch64
          path: output/
