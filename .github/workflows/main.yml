name: Build OpenJDK 25 for iOS

on:
  workflow_dispatch:

jobs:
  build-ios-jdk:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Boot JDK 24
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '24'

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Fix TARGET triple
        run: |
          sed -i '' 's/export TARGET=aarch64-apple-ios/export TARGET=aarch64-apple-darwin/' \
            angelauramc-openjdk-build/1_ci_build_arch_aarch64.sh

      - name: Fix Boot JDK path
        run: |
          BOOT_JDK=$(/usr/libexec/java_home -v 24)
          sed -i '' "s|--with-boot-jdk=\$(/usr/libexec/java_home -v \$TARGET_VERSION)|--with-boot-jdk=${BOOT_JDK}|g" \
            angelauramc-openjdk-build/6_buildjdk.sh

      # 关键：创建过滤器包装器，移除 -mmacosx-version-min
      - name: Create compiler wrapper to filter conflicting flags
        run: |
          cat > /tmp/filter_clang.sh << 'FILTER_EOF'
          #!/bin/bash
          filtered_args=()
          for arg in "$@"; do
            case "$arg" in
              -mmacosx-version-min*) ;;
              *) filtered_args+=("$arg") ;;
            esac
          done
          exec /usr/bin/xcrun --sdk iphoneos clang -arch arm64 "${filtered_args[@]}"
          FILTER_EOF
          chmod +x /tmp/filter_clang.sh
          
          # 覆盖原有的包装脚本
          cat > angelauramc-openjdk-build/ios-arm64-clang << 'WRAPPER_EOF'
          #!/bin/bash
          exec /tmp/filter_clang.sh "$@"
          WRAPPER_EOF
          cp angelauramc-openjdk-build/ios-arm64-clang angelauramc-openjdk-build/ios-arm64-clang++
          chmod +x angelauramc-openjdk-build/ios-arm64-clang angelauramc-openjdk-build/ios-arm64-clang++

      - name: Create dummy patches directory
        run: mkdir -p angelauramc-openjdk-build/patches/jre_25/ios

      - name: Build OpenJDK 25 for iOS
        run: |
          cd angelauramc-openjdk-build
          export BUILD_IOS=1
          export TARGET_VERSION=25
          export TOO_MANY_CORES=1
          ./1_ci_build_arch_aarch64.sh

      - name: Collect artifacts
        if: success()
        run: |
          mkdir -p output
          find . -maxdepth 1 -name "*.tar.xz" -exec mv {} output/ \;

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: openjdk-25-ios-aarch64
          path: output/
