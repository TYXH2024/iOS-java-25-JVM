name: Build OpenJDK 25 for iOS

on:
  workflow_dispatch:

jobs:
  build-ios-jdk:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Boot JDK 24
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '24'

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Fix TARGET triple
        run: |
          sed -i '' 's/export TARGET=aarch64-apple-ios/export TARGET=aarch64-apple-darwin/' \
            angelauramc-openjdk-build/1_ci_build_arch_aarch64.sh

      - name: Fix Boot JDK path
        run: |
          BOOT_JDK=$(/usr/libexec/java_home -v 24)
          sed -i '' "s|--with-boot-jdk=\$(/usr/libexec/java_home -v \$TARGET_VERSION)|--with-boot-jdk=${BOOT_JDK}|g" \
            angelauramc-openjdk-build/6_buildjdk.sh

      - name: Remove problematic macOS-specific source files
        run: |
          # 删除导致编译错误的 macOS 专用文件
          rm -f openjdk-25/src/hotspot/os/bsd/memMapPrinter_macosx.cpp
          # 禁用 jdk.hotspot.agent 模块（因为它依赖 mach 接口，iOS 不支持）
          rm -rf openjdk-25/src/jdk.hotspot.agent
          # 删除其他可能引用 mach 的文件
          find openjdk-25 -name "*.defs" -delete
          find openjdk-25 -name "*_macosx*" -type f -delete

      - name: Create dummy patches directory
        run: mkdir -p angelauramc-openjdk-build/patches/jre_25/ios

      - name: Build OpenJDK 25 for iOS
        run: |
          cd angelauramc-openjdk-build
          export BUILD_IOS=1
          export TARGET_VERSION=25
          export TOO_MANY_CORES=1
          ./1_ci_build_arch_aarch64.sh

      - name: Collect artifacts
        if: success()
        run: |
          mkdir -p output
          find . -maxdepth 1 -name "*.tar.xz" -exec mv {} output/ \;

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: openjdk-25-ios-aarch64
          path: output/
